#   goblin-charm: 50 * 1.2 = 60 gold
#
# Expected sell prices (default discount 0.5x):
#   leather-cap:  8  * 0.5 = 4 gold
#   goblin-charm: 50 * 0.5 = 25 gold
#
# Expected buy prices (high-markup 1.4x):

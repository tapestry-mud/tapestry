app = "tapestry-mud"
primary_region = "ord"

[build]

[mounts]
  source = "tapestry_saves"
  destination = "/app/data/saves"

[[services]]
  internal_port = 4000
  protocol = "tcp"

  [[services.ports]]
    port = 4000

[[services]]
  internal_port = 4001
  protocol = "tcp"

  [[services.ports]]
    port = 4001

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
